<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QJPGCKW2XT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QJPGCKW2XT');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Did you take your medicine today?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .date-display {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 24px;
        }
        
        .question {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 24px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .btn-yes {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-no {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
        }
        
        .btn-logout {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .history-title {
            color: #333;
            font-size: 18px;
            margin-bottom: 16px;
        }
        
        .medicine-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        
        .medicine-name {
            font-weight: 600;
            color: #333;
        }
        
        .medicine-time {
            color: #666;
            font-size: 14px;
        }
        
        .medicine-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-taken {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        .btn-close {
            background: #e0e0e0;
            color: #333;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .user-info span {
            margin-left: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录页面 -->
        <div class="card" id="loginCard">
            <h1>💊 Did you take your medicine today?</h1>
            <p class="subtitle">健康提醒小程序</p>
            <p style="text-align: center; color: #666; margin-bottom: 24px;">
                登录后可同步数据到云端
            </p>
            <button class="btn btn-login" onclick="login()">
                🚀 使用 Google 账号登录
            </button>
        </div>
        
        <!-- 主页面 -->
        <div class="card" id="mainCard" style="display: none;">
            <div class="user-info">
                <div style="display: flex; align-items: center;">
                    <img id="userAvatar" src="" alt="avatar" style="width: 40px; height: 40px; border-radius: 50%; display: none;">
                    <span id="userName"></span>
                </div>
                <button class="btn btn-logout" onclick="logout()" style="width: auto; padding: 8px 16px; font-size: 14px; margin: 0;">
                    退出
                </button>
            </div>
            
            <h1>💊 Did you take your medicine today?</h1>
            <p class="subtitle">健康提醒小程序</p>
            <div class="date-display" id="dateDisplay"></div>
            <div class="question">你今天吃药了吗？</div>
            <button class="btn btn-yes" onclick="markTaken()">✅ 是的，吃过了</button>
            <button class="btn btn-no" onclick="markNotTaken()">❌ 还没有</button>
        </div>
        
        <div class="card" id="medicineCard" style="display: none;">
            <h3 class="history-title">💊 我的药物</h3>
            <div id="medicineList"></div>
            <button class="btn btn-add" onclick="openModal()">➕ 添加药物</button>
        </div>
        
        <div class="card" id="recordCard" style="display: none;">
            <h3 class="history-title">📊 今日记录</h3>
            <div id="todayRecord"></div>
        </div>
    </div>
    
    <!-- 添加药物弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">添加新药物</div>
            <div class="input-group">
                <label>药物名称</label>
                <input type="text" id="medicineName" placeholder="例如：维生素C">
            </div>
            <div class="input-group">
                <label>提醒时间</label>
                <input type="time" id="medicineTime" value="09:00">
            </div>
            <div class="input-group">
                <label>剂量说明</label>
                <input type="text" id="medicineDose" placeholder="例如：1片">
            </div>
            <button class="btn btn-add" onclick="addMedicine()">保存</button>
            <button class="btn btn-close" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = 'https://user-auth-worker.aliboit888.workers.dev';
        
        // 状态
        let medicines = [];
        let records = {};
        
        function getToken() {
            // 先从 URL 参数读取 token
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('auth_token', urlToken);
                const email = params.get('email');
                const name = params.get('name');
                if (email) localStorage.setItem('user_email', email);
                if (name) localStorage.setItem('user_name', name);
                // 清除 URL 参数
                window.history.replaceState({}, '', window.location.pathname);
                return urlToken;
            }
            return localStorage.getItem('auth_token');
        }
        
        // 初始化
        async function init() {
            // 显示日期
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('dateDisplay').textContent = dateStr;
            
            // 请求通知权限
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
            
            // 检查登录状态
            const token = getToken();
            if (token) {
                try {
                    const response = await fetch(API_BASE + '/api/user', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        const user = await response.json();
                        showMainPage(user);
                    } else {
                        // Token 无效，清除
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user_email');
                        localStorage.removeItem('user_name');
                        showLoginPage();
                    }
                } catch (e) {
                    showLoginPage();
                }
            } else {
                showLoginPage();
            }
        }
        
        function showLoginPage() {
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('mainCard').style.display = 'none';
            document.getElementById('medicineCard').style.display = 'none';
            document.getElementById('recordCard').style.display = 'none';
        }
        
        function showMainPage(user) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
            document.getElementById('medicineCard').style.display = 'block';
            document.getElementById('recordCard').style.display = 'block';
            
            // 显示用户信息
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userName');
            if (user.picture) {
                avatar.src = user.picture;
                avatar.style.display = 'block';
            }
            nameEl.textContent = user.name || user.email;
            
            // 加载数据
            loadMedicines();
            loadRecords();
            
            // 启动提醒检查
            checkReminders();
        }
        
        // 登录
        function login() {
            window.location.href = API_BASE + '/auth/google';
        }
        
        // 退出
        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_name');
            token = null;
            showLoginPage();
        }
        
        // 从 API 加载药物列表
        async function loadMedicines() {
            try {
                const response = await fetch(API_BASE + '/api/medicines', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    medicines = await response.json();
                    renderMedicines();
                }
            } catch (e) {
                console.error('Failed to load medicines:', e);
            }
        }
        
        // 从 API 加载记录
        async function loadRecords() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(API_BASE + '/api/records?date=' + today, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const takenList = await response.json();
                    records[today] = takenList.map(r => r.name);
                    renderTodayRecord();
                }
            } catch (e) {
                console.error('Failed to load records:', e);
            }
        }
        
        // 渲染药物列表
        function renderMedicines() {
            const list = document.getElementById('medicineList');
            if (medicines.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无药物，请添加</div>';
                return;
            }
            
            const todayKey = new Date().toISOString().split('T')[0];
            
            list.innerHTML = medicines.map((med) => {
                const taken = records[todayKey]?.includes(med.name);
                return `
                    <div class="medicine-item">
                        <div>
                            <div class="medicine-name">${med.name}</div>
                            <div class="medicine-time">${med.time} · ${med.dose}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="medicine-status ${taken ? 'status-taken' : 'status-pending'}">
                                ${taken ? '已服用' : '待服用'}
                            </span>
                            <button class="delete-btn" onclick="deleteMedicine(${med.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 渲染今日记录
        function renderTodayRecord() {
            const todayKey = new Date().toISOString().split('T')[0];
            const takenList = records[todayKey] || [];
            const list = document.getElementById('todayRecord');
            
            if (takenList.length === 0) {
                list.innerHTML = '<div class="empty-state">今日尚未记录</div>';
                return;
            }
            
            list.innerHTML = `
                <div class="medicine-item">
                    <span>✅ 今日已服用: ${takenList.join(', ')}</span>
                </div>
            `;
        }
        
        // 标记已服用
        async function markTaken() {
            try {
                const response = await fetch(API_BASE + '/api/records/mark-all', {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                if (response.ok) {
                    const result = await response.json();
                    // 刷新记录
                    await loadRecords();
                    renderMedicines();
                    
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('💊 服药记录', {
                            body: `已记录 ${result.count} 种药物！`,
                            icon: '💊'
                        });
                    }
                }
            } catch (e) {
                alert('记录失败，请重试');
            }
        }
        
        function markNotTaken() {
            alert('好的，记得稍后服用哦！');
        }
        
        function openModal() {
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        // 添加药物
        async function addMedicine() {
            const name = document.getElementById('medicineName').value.trim();
            const time = document.getElementById('medicineTime').value;
            const dose = document.getElementById('medicineDose').value.trim();
            
            if (!name || !time) {
                alert('请填写药物名称和时间');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/api/medicines', {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, time, dose: dose || '1片' })
                });
                
                if (response.ok) {
                    closeModal();
                    document.getElementById('medicineName').value = '';
                    document.getElementById('medicineDose').value = '';
                    await loadMedicines();
                } else {
                    alert('添加失败，请重试');
                }
            } catch (e) {
                alert('添加失败，请重试');
            }
        }
        
        // 删除药物
        async function deleteMedicine(id) {
            if (!confirm('确定要删除这个药物吗？')) return;
            
            try {
                const response = await fetch(API_BASE + '/api/medicines?id=' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    await loadMedicines();
                } else {
                    alert('删除失败，请重试');
                }
            } catch (e) {
                alert('删除失败，请重试');
            }
        }
        
        // 定时检查提醒
        function checkReminders() {
            setInterval(() => {
                const now = new Date();
                const currentTime = now.toTimeString().slice(0, 5);
                
                medicines.forEach(med => {
                    if (med.time === currentTime) {
                        const todayKey = new Date().toISOString().split('T')[0];
                        const taken = records[todayKey]?.includes(med.name);
                        
                        if (!taken && 'Notification' in window && Notification.permission === 'granted') {
                            new Notification('💊 服药提醒', {
                                body: `该服用 ${med.name} (${med.dose}) 了！`,
                                icon: '💊',
                                requireInteraction: true
                            });
                        }
                    }
                });
            }, 60000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
