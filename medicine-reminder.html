    <style>

        .date-display {

            font-size: 28px;

            margin-bottom: 16px;
        }
        
        .question {
            text-align: center;
            font-size: 26px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;

        .btn:hover {
            transform: translateY(-2px);

        .btn-yes {

        .btn-no {

        }
        
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }
        
        .btn-edit {
            background: #f5f5f5;

        }
        
        .btn-save {

        .medicine-status {

            margin-left: 12px;
        }
        
        .status-taken {

        }
        
        .status-pending {

        .input-group {

        .input-group label {
            display: block;

        .input-group input {
            width: 100%;

            border: 2px solid #e0e0e0;

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;

            padding: 24px;

        }
        
        .modal-title {

        }
        
        .modal-buttons {

        .modal-buttons .btn {

        }
        
        .btn-close {
            background: #e0e0e0;

        .delete-btn {
            background: #ff4757;
            color: white;

            border: none;
            border-radius: 8px;

        }
        
        .edit-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .history-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        
        .history-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;

        .history-day-name {

        .history-day-date {

        }
        
        .history-day-status {
            font-size: 18px;
            margin-top: 4px;
        }
        
        .notification-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }
        
        .notification-hint a {
            color: #667eea;
            text-decoration: none;
        }
        
        .login-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;

        .login-link:hover {

        .lang-switcher {
            position: relative;
            display: inline-block;
        }
        
        .lang-switcher select {
            appearance: none;
            background: rgba(255,255,255,0.15);

            color: white;

            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        
        .lang-switcher select option {
            background: #667eea;
            color: white;
        }
        
        .lang-switcher::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: white;
            pointer-events: none;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            .question {

            }
            
            .btn {

<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">

                <a href="donation.html" style="text-decoration: none; color: white; font-size: 14px; padding: 8px 16px; background: rgba(255,255,255,0.15); border-radius: 20px; display: flex; align-items: center; gap: 6px;">
                    💝 <span class="i18n" data-key="donate">捐赠</span>
                </a>
                <div class="lang-switcher">
                    <select id="langSelect" onchange="switchLanguage(this.value)">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
            <div style="text-align: right;">
                <a href="login.html" id="loginLink" class="btn" style="display: inline-block; width: auto; padding: 10px 20px; text-decoration: none; background: linear-gradient(135deg, #4285f4 0%, #34a853 100%); color: white; border-radius: 10px; font-size: 14px;"> Sign In </a>
                <div id="userInfo" style="display: none; align-items: center; justify-content: flex-end; gap: 12px;">
                    <a href="user.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                        <img id="userAvatar" src="" alt="avatar" style="width: 36px; height: 36px; border-radius: 50%; cursor: pointer;">
                        <span id="userName" style="color: white; font-weight: 600; cursor: pointer;"></span>
                    </a>
                    <button onclick="logout()" class="i18n-btn" data-key="logout" style="padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">退出</button>
                </div>
            </div>
        </div>
        
        <!-- 主页 -->
        <div class="card" id="mainCard">
            <h1 class="i18n" data-key="title">💊 你今天吃药了吗？</h1>
            <p class="subtitle i18n" data-key="subtitle">健康提醒小程序</p>
            <div class="date-display" id="dateDisplay"></div>
            <div class="question i18n" data-key="question">你今天吃药了吗？</div>
            <button class="btn btn-yes i18n-btn" data-key="yesTaken" onclick="markAllTaken()">✅ 是的，吃过了</button>
            <button class="btn btn-no i18n-btn" data-key="noNotYet" onclick="remindLater()">❌ 还没有</button>
        </div>
        
        <!-- 药物列表 -->
        <div class="card" id="medicineCard">
            <h3 class="history-title i18n" data-key="myMedicines">💊 我的药物</h3>
            <div id="medicineList"></div>
            <button class="btn btn-add i18n-btn" data-key="addMedicine" onclick="openAddModal()">➕ 添加药物</button>
        </div>
        
        <!-- 7天历史 -->
        <div class="card" id="historyCard">
            <h3 class="history-title i18n" data-key="sevenDayRecord">📅 7天服药记录</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    
    <!-- 添加/编辑药物弹窗 -->
    <div class="modal" id="medicineModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">添加新药物</div>
            <div class="input-group">
                <label class="i18n-label" data-key="medicineName">药物名称 *</label>
                <input type="text" id="medicineName" placeholder="例如：维生素C">
            </div>
            <div class="input-group">
                <label class="i18n-label" data-key="reminderTime">提醒时间 *</label>
                <input type="time" id="medicineTime" value="09:00">
            </div>
            <div class="input-group">
                <label class="i18n-label" data-key="doseInfo">剂量说明</label>
                <input type="text" id="medicineDose" placeholder="例如：1片">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-close i18n-btn" data-key="cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-save i18n-btn" data-key="save" id="saveBtn" onclick="saveMedicine()">保存</button>
            </div>
        </div>
    </div>

    <div class="notification-hint" id="notificationHint">
        开启通知权限，接收服药提醒 <a href="#" onclick="requestNotification()">点击开启</a>
    </div>

    <script>
        // 数据存储键名
        const STORAGE_MEDICINES = 'medicines';
        const STORAGE_RECORDS = 'records';
        const STORAGE_LANG = 'language';
        
        // 状态
        let medicines = [];
        let records = {};  // { "2026-03-17": ["维生素C", "钙片"], ... }
        let editingMedicineId = null;
        let currentLang = 'zh';
        
        // 登录状态
        const LOGIN_API = 'https://user-auth-worker.aliboit888.workers.dev';
        
        // 翻译数据
        const i18n = {
            zh: {
                donate: '捐赠',
                signIn: 'Sign In',
                logout: '退出',
                title: '你今天吃药了吗？',
                subtitle: '健康提醒小程序',
                question: '你今天吃药了吗？',
                yesTaken: '✅ 是的，吃过了',
                noNotYet: '❌ 还没有',
                myMedicines: '我的药物',
                addMedicine: '添加药物',
                sevenDayRecord: '7天服药记录',
                addNewMedicine: '添加新药物',
                medicineName: '药物名称',
                medicineNamePlaceholder: '例如：维生素C',
                reminderTime: '提醒时间',
                doseInfo: '剂量说明',
                dosePlaceholder: '例如：1片',
                cancel: '取消',
                save: '保存',
                add: '添加',
                edit: '编辑',
                delete: '删除',
                taken: '已服用',
                pending: '待服用',
                noMedicines: '暂无药物，请添加您的第一个药物',
                notificationEnabled: '🔔 通知权限已开启',
                notificationDisabled: '❌ 通知被禁用，请在浏览器设置中开启',
                enableNotification: '开启通知权限，接收服药提醒',
                clickToEnable: '点击开启',
                recorded: '已记录今日服药！',
                remindLater: '好的，记得稍后服用哦！',
                pleaseEnterName: '请填写药物名称',
                pleaseSelectTime: '请选择提醒时间',
                confirmDelete: '确定要删除这个药物吗？',
                loggedOut: '已退出登录'
            },
            en: {
                donate: 'Donate',
                signIn: 'Sign In',
                logout: 'Logout',
                title: '💊 Did You Take Your Medicine?',
                subtitle: 'Health Reminder App',
                question: 'Did you take your medicine today?',
                yesTaken: '✅ Yes, I did',
                noNotYet: '❌ Not yet',
                myMedicines: 'My Medicines',
                addMedicine: 'Add Medicine',
                sevenDayRecord: '7-Day Medication Record',
                addNewMedicine: 'Add New Medicine',
                medicineName: 'Medicine Name',
                medicineNamePlaceholder: 'e.g., Vitamin C',
                reminderTime: 'Reminder Time',
                doseInfo: 'Dosage',
                dosePlaceholder: 'e.g., 1 tablet',
                cancel: 'Cancel',
                save: 'Save',
                add: 'Add',
                edit: 'Edit',
                delete: 'Delete',
                taken: 'Taken',
                pending: 'Pending',
                noMedicines: 'No medicines yet. Add your first medicine!',
                notificationEnabled: '🔔 Notifications enabled',
                notificationDisabled: '❌ Notifications disabled. Please enable in browser settings.',
                enableNotification: 'Enable notifications to receive reminders',
                clickToEnable: 'Click to enable',
                recorded: '✅ Today\'s medication recorded!',
                remindLater: 'Okay, remember to take it later!',
                pleaseEnterName: 'Please enter medicine name',
                pleaseSelectTime: 'Please select reminder time',
                confirmDelete: 'Are you sure you want to delete this medicine?',
                loggedOut: 'Logged out successfully'
            }
        };
        
        // 切换语言
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem(STORAGE_LANG, lang);
            applyTranslations();
            renderUI();
        }
        
        // 应用翻译到所有 i18n 元素
        function applyTranslations() {
            const t = i18n[currentLang];
            
            // 处理文本元素
            document.querySelectorAll('.i18n').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            // 处理按钮文本
            document.querySelectorAll('.i18n-btn').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            // 处理标签文本
            document.querySelectorAll('.i18n-label').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            // 处理 placeholder
            const namePlaceholder = currentLang === 'en' ? 'e.g., Vitamin C' : '例如：维生素C';
            const dosePlaceholder = currentLang === 'en' ? 'e.g., 1 tablet' : '例如：1片';
            document.getElementById('medicineName').placeholder = namePlaceholder;
            document.getElementById('medicineDose').placeholder = dosePlaceholder;
            
            // 更新 document title
            document.title = t.title;
            
            // 更新语言选择器
            document.getElementById('langSelect').value = currentLang;
        }
        
        // 初始化
        function init() {
            // 加载语言设置
            const savedLang = localStorage.getItem(STORAGE_LANG);
            if (savedLang) {
                currentLang = savedLang;
            }
            
            // 检查登录状态
            checkLoginStatus();
            loadData();
            applyTranslations();
            renderUI();
            requestNotificationPermission();
            startReminderCheck();
        }
        
        // 检查登录状态
        function checkLoginStatus() {
            // 先从 URL 参数读取登录信息
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            const urlEmail = params.get('email');
            const urlName = params.get('name');
            const urlPicture = params.get('picture');
            
            if (urlToken) {
                // 保存登录信息到 localStorage
                localStorage.setItem('auth_token', urlToken);
                localStorage.setItem('user_email', urlEmail || '');
                localStorage.setItem('user_name', urlName || '');
                localStorage.setItem('user_picture', urlPicture || '');
                // 清除 URL 参数
                window.history.replaceState({}, '', window.location.pathname);
            }
            
            const token = localStorage.getItem('auth_token');
            const userEmail = localStorage.getItem('user_email');
            const userName = localStorage.getItem('user_name');
            const userPicture = localStorage.getItem('user_picture');
            
            if (token && userEmail) {
                // 已登录，显示用户信息
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').textContent = userName || userEmail;
                if (userPicture) {
                    document.getElementById('userAvatar').src = userPicture;
                    document.getElementById('userAvatar').style.display = 'block';
                }
                // 更新退出按钮文字
                const logoutBtn = document.querySelector('#userInfo button.i18n-btn');
                if (logoutBtn) {
                    logoutBtn.textContent = i18n[currentLang].logout;
                }
            } else {
                // 未登录，显示登录按钮
                document.getElementById('loginLink').style.display = 'inline-block';
                document.getElementById('loginLink').textContent = i18n[currentLang].signIn;
                document.getElementById('userInfo').style.display = 'none';
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_picture');
            checkLoginStatus();
            alert(i18n[currentLang].loggedOut);
        }
        
        // 从 LocalStorage 加载数据
        function loadData() {
            try {
                const meds = localStorage.getItem(STORAGE_MEDICINES);
                const recs = localStorage.getItem(STORAGE_RECORDS);
                medicines = meds ? JSON.parse(meds) : [];
                records = recs ? JSON.parse(recs) : {};
            } catch (e) {
                console.error('Failed to load data:', e);
                medicines = [];
                records = {};
            }
        }
        
        // 保存数据到 LocalStorage
        function saveData() {
            try {
                // 清理30天前的记录
                cleanupOldRecords();
                localStorage.setItem(STORAGE_MEDICINES, JSON.stringify(medicines));
                localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records));
            } catch (e) {
                console.error('Failed to save data:', e);
            }
        }
        
        // 清理30天前的记录
        function cleanupOldRecords() {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            const cutoffDate = thirtyDaysAgo.toISOString().split('T')[0];
            
            Object.keys(records).forEach(date => {
                if (date < cutoffDate) {
                    delete records[date];
                }
            });
        }
        
        // 渲染UI
        function renderUI() {
            renderDate();
            renderMedicines();
            renderHistory();
        }
        
        // 显示日期
        function renderDate() {
            const today = new Date();
            const locale = currentLang === 'en' ? 'en-US' : 'zh-CN';
            const dateStr = today.toLocaleDateString(locale, { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('dateDisplay').textContent = dateStr;
        }
        
        // 渲染药物列表
        function renderMedicines() {
            const list = document.getElementById('medicineList');
            const todayKey = getTodayKey();
            const takenToday = records[todayKey] || [];
            
            if (medicines.length === 0) {
                list.innerHTML = `<div class="empty-state">${i18n[currentLang].noMedicines}</div>`;
                return;
            }
            
            list.innerHTML = medicines.map(med => {
                const taken = takenToday.includes(med.name);
                const t = i18n[currentLang];
                return `
                    <div class="medicine-item">
                        <div class="medicine-info">
                            <div class="medicine-name">${med.name}</div>
                            <div class="medicine-detail">⏰ ${med.time} · 💊 ${med.dose}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="medicine-status ${taken ? 'status-taken' : 'status-pending'}">
                                ${taken ? '✅ ' + t.taken : '⏳ ' + t.pending}
                            </span>
                            <button class="edit-btn" onclick="editMedicine(${med.id})">${t.edit}</button>
                            <button class="delete-btn" onclick="deleteMedicine(${med.id})">${t.delete}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 渲染7天历史
        function renderHistory() {
            const list = document.getElementById('historyList');
            const today = new Date();
            const dayNames = currentLang === 'en' 
                ? ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
                : ['日', '一', '二', '三', '四', '五', '六'];
            const weekPrefix = currentLang === 'en' ? '' : '周';
            
            let html = '';
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const dayName = dayNames[date.getDay()];
                const dayNum = date.getDate();
                const taken = (records[dateStr] || []).length;
                const total = medicines.length;
                
                let status = '';
                if (total === 0) {
                    status = '⚪';
                } else if (taken === 0) {
                    status = '❌';
                } else if (taken < total) {
                    status = '◐';
                } else {
                    status = '✅';
                }
                
                html += `
                    <div class="history-day">
                        <span class="history-day-name">${weekPrefix}${dayName}</span>
                        <span class="history-day-date">${dayNum}</span>
                        <span class="history-day-status">${status}</span>
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }
        
        // 获取今日日期字符串
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }
        
        // 标记所有药物已服用
        function markAllTaken() {
            const todayKey = getTodayKey();
            const takenToday = records[todayKey] || [];
            
            // 将所有药物标记为已服用
            medicines.forEach(med => {
                if (!takenToday.includes(med.name)) {
                    takenToday.push(med.name);
                }
            });
            
            records[todayKey] = takenToday;
            saveData();
            renderMedicines();
            renderHistory();
            
            // 显示通知
            const t = i18n[currentLang];
            if (takenToday.length > 0 && 'Notification' in window && Notification.permission === 'granted') {
                new Notification('💊 ' + (currentLang === 'en' ? 'Medication Recorded' : '服药记录成功'), {
                    body: `${currentLang === 'en' ? `Recorded ${takenToday.length} medicine(s). Done for today!` : `已记录 ${takenToday.length} 种药物，今日服药完成！`}`,
                    icon: '💊'
                });
            }
            
            alert(t.recorded);
        }
        
        // 稍后提醒
        function remindLater() {
            alert(i18n[currentLang].remindLater);
        }
        
        // 打开添加弹窗
        function openAddModal() {
            const t = i18n[currentLang];
            editingMedicineId = null;
            document.getElementById('modalTitle').textContent = t.addNewMedicine;
            document.getElementById('medicineName').value = '';
            document.getElementById('medicineTime').value = '09:00';
            document.getElementById('medicineDose').value = '';
            document.getElementById('saveBtn').textContent = t.add;
            document.getElementById('medicineModal').classList.add('active');
        }
        
        // 编辑药物
        function editMedicine(id) {
            const med = medicines.find(m => m.id === id);
            if (!med) return;
            
            const t = i18n[currentLang];
            editingMedicineId = id;
            document.getElementById('modalTitle').textContent = t.edit + ' ' + med.name;
            document.getElementById('medicineName').value = med.name;
            document.getElementById('medicineTime').value = med.time;
            document.getElementById('medicineDose').value = med.dose;
            document.getElementById('saveBtn').textContent = t.save;
            document.getElementById('medicineModal').classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('medicineModal').classList.remove('active');
            editingMedicineId = null;
        }
        
        // 保存药物
        function saveMedicine() {
            const name = document.getElementById('medicineName').value.trim();
            const time = document.getElementById('medicineTime').value;
            const dose = document.getElementById('medicineDose').value.trim() || (currentLang === 'en' ? '1 tablet' : '1片');
            const t = i18n[currentLang];
            
            if (!name) {
                alert(t.pleaseEnterName);
                return;
            }
            
            if (!time) {
                alert(t.pleaseSelectTime);
                return;
            }
            
            if (editingMedicineId) {
                // 编辑
                const med = medicines.find(m => m.id === editingMedicineId);
                if (med) {
                    med.name = name;
                    med.time = time;
                    med.dose = dose;
                }
            } else {
                // 添加
                medicines.push({
                    id: Date.now(),
                    name: name,
                    time: time,
                    dose: dose
                });
            }
            
            saveData();
            closeModal();
            renderMedicines();
            renderHistory();
        }
        
        // 删除药物
        function deleteMedicine(id) {
            if (!confirm(i18n[currentLang].confirmDelete)) return;
            
            medicines = medicines.filter(m => m.id !== id);
            saveData();
            renderMedicines();
            renderHistory();
        }
        
        // 请求通知权限
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                document.getElementById('notificationHint').style.display = 'none';
                return;
            }
            
            const t = i18n[currentLang];
            if (Notification.permission === 'granted') {
                document.getElementById('notificationHint').textContent = t.notificationEnabled;
            } else if (Notification.permission === 'denied') {
                document.getElementById('notificationHint').innerHTML = t.notificationDisabled;
            } else {
                document.getElementById('notificationHint').innerHTML = `${t.enableNotification} <a href="#" onclick="requestNotification()">${t.clickToEnable}</a>`;
            }
        }
        
        // 用户手动请求通知
        function requestNotification() {
            if ('Notification' in window) {
                Notification.requestPermission();
            }
            return false;
        }
        
        // 定时检查提醒
        function startReminderCheck() {
            // 每分钟检查一次
            setInterval(() => {
                if (!('Notification' in window) || Notification.permission !== 'granted') {
                    return;
                }
                
                const now = new Date();
                const currentTime = now.toTimeString().slice(0, 5);
                const todayKey = getTodayKey();
                const takenToday = records[todayKey] || [];
                
                medicines.forEach(med => {
                    if (med.time === currentTime && !takenToday.includes(med.name)) {
                        new Notification('💊 ' + (currentLang === 'en' ? 'Medication Reminder' : '服药提醒'), {
                            body: `${currentLang === 'en' ? `Time to take ${med.name} (${med.dose})!` : `该服用 ${med.name} (${med.dose}) 了！`}`,
                            icon: '💊',
                            requireInteraction: true
                        });
                    }
                });
            }, 60000);
        }
        
        // 启动
        init();
    </script>
