    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 16px;
        }
        
        h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        /* 用户信息卡片 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }
        
        .avatar-placeholder {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            font-weight: bold;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        
        .profile-email {
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .verified-badge {
            color: #34a853;
            font-size: 12px;
        }
        
        /* Google 账号标识 */
        .google-account {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        
        .google-icon {
            width: 14px;
            height: 14px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 16px 8px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* 菜单列表 */
        .menu-list {
            list-style: none;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .menu-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .icon-purple { background: #ede7f6; }

        .icon-blue { background: #e3f2fd; }
        .icon-orange { background: #fff3e0; }
        .icon-red { background: #ffebee; }
        
        .menu-item-text {
            flex: 1;
        }
        
        .menu-item-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        
        .menu-item-desc {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .menu-arrow {
            color: #ccc;
            font-size: 18px;
        }
        
        /* 登出按钮 */

            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-logout {
            background: #ff4757;
            color: white;
        }
        
        .btn-logout:hover {

        .btn-back {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            margin-bottom: 12px;
        }
        
        .btn-back:hover {
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }
        
        /* 提醒设置开关 */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #667eea;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }
        
        /* 打卡日历预览 */
        .calendar-preview {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 12px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
        }
        
        .day-taken {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .day-missed {
            background: #ffebee;
            color: #ff4757;
        }
        
        .day-empty {
            background: #f5f5f5;
            color: #ccc;
        }
        
        .calendar-label {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 8px;
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* 语言切换器 */
        .lang-switcher {
            position: relative;
            display: inline-block;
        }
        
        .lang-switcher select {
            appearance: none;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: white;
            padding: 8px 32px 8px 14px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        
        .lang-switcher select option {
            background: #667eea;
            color: white;
        }
        
        .lang-switcher::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: white;
            pointer-events: none;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // API 配置

        const STORAGE_LANG = 'language';
        
        let token = null;

        let currentLang = 'zh';
        
        // 翻译数据
        const i18n = {

                exportMedicines: 'Export Medicine List',
                exportMedicinesDesc: 'Download current medicine configuration',

                pleaseLogin: 'Please login first',

                denied: 'Denied. Please enable in browser settings.',
                unauthorized: 'Not authorized',
                days: 'days'
            }
        };
        
        // 切换语言
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem(STORAGE_LANG, lang);
            applyTranslations();
            checkNotificationStatus();
        }
        
        // 应用翻译
        function applyTranslations() {
            const t = i18n[currentLang];
            
            document.querySelectorAll('.i18n').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            // 更新 document title
            document.title = (currentLang === 'en' ? 'Profile' : '个人中心') + ' - ' + t.appName;
            
            // 更新语言选择器
            document.getElementById('langSelect').value = currentLang;
            
            // 更新连续打卡天数
            const streakEl = document.getElementById('statStreak');
            if (streakEl && streakEl.textContent !== '-') {
                const streakNum = streakEl.textContent.replace('天', '').replace('days', '');
                if (streakNum && !isNaN(streakNum)) {
                    streakEl.textContent = streakNum + t.days;
                }
            }
        }
        
        // 获取 token
        function getToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('auth_token', urlToken);
                const email = params.get('email');
                const name = params.get('name');
                const picture = params.get('picture');
                if (email) localStorage.setItem('user_email', email);
                if (name) localStorage.setItem('user_name', name);
                if (picture) localStorage.setItem('user_picture', picture);
                window.history.replaceState({}, '', window.location.pathname);
                return urlToken;
            }
            return localStorage.getItem('auth_token');
        }
        
        // 初始化
        async function init() {
            // 加载语言设置
            const savedLang = localStorage.getItem(STORAGE_LANG);
            if (savedLang) {
                currentLang = savedLang;
            }
            applyTranslations();
            
            token = getToken();
            
            if (!token) {
                showToast(i18n[currentLang].pleaseLogin);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }
            
            // 从 localStorage 获取用户基本信息（登录时已存储）
            const storedEmail = localStorage.getItem('user_email');
            const storedName = localStorage.getItem('user_name');
            const storedPicture = localStorage.getItem('user_picture');
            
            if (!storedEmail) {
                showToast(i18n[currentLang].userNotFound);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }
            
            // 直接使用本地存储的用户信息显示
            userData = {
                email: storedEmail,
                name: storedName || storedEmail.split('@')[0],
                picture: storedPicture || ''
            };
            renderProfile(userData);
            
            // 尝试从 API 获取完整信息（包括 id、注册时间等）
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch(API_BASE + '/api/user', {
                    method: 'GET',
                    headers: { 
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    mode: 'cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const apiUser = await response.json();
                    // 更新用户信息（如果 API 返回更完整的数据）
                    if (apiUser.id) userData.id = apiUser.id;
                    if (apiUser.created_at) userData.created_at = apiUser.created_at;
                    if (apiUser.picture && !userData.picture) userData.picture = apiUser.picture;
                    renderProfile(userData);
                }
            } catch (e) {
                console.warn('API call failed, using localStorage data:', e.message);
                // API 失败不影响显示，使用本地存储的数据继续
            }
            
            // 获取统计数据（可能失败，不影响主流程）
            try {
                await loadStats();
            } catch (e) {
                console.warn('Failed to load stats:', e.message);
                // 统计加载失败，显示为空
                document.getElementById('statDays').textContent = '-';
                document.getElementById('statRate').textContent = '-%';
                document.getElementById('statStreak').textContent = '-';
            }
            
            // 检查通知状态
            checkNotificationStatus();
        }
        
        // 清除认证并跳转登录页（不弹确认框）
        function clearAuthAndRedirect(reason) {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_picture');
            token = null;
            showToast(i18n[currentLang].sessionExpired + ' (' + (reason || 'API Error') + ')');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
        
        // 渲染用户信息
        function renderProfile(user) {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('profileCard').style.display = 'block';
            document.getElementById('settingsCard').style.display = 'block';
            document.getElementById('dataCard').style.display = 'block';
            document.getElementById('accountCard').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
            
            // 名称
            const name = user.name || user.email.split('@')[0];
            document.getElementById('userName').textContent = name;
            document.getElementById('avatarPlaceholder').textContent = name.charAt(0).toUpperCase();
            
            // 邮箱
            document.getElementById('emailText').textContent = user.email;
            if (user.email) {
                document.getElementById('verifiedBadge').style.display = 'inline';
            }
            
            // 头像
            if (user.picture) {
                const avatar = document.getElementById('userAvatar');
                avatar.src = user.picture;
                avatar.style.display = 'block';
                document.getElementById('avatarPlaceholder').style.display = 'none';
            }
            
            // 账号信息
            document.getElementById('accountId').textContent = '#' + user.id;
            if (user.created_at) {
                const date = new Date(user.created_at);
                document.getElementById('joinDate').textContent = date.toLocaleDateString('zh-CN');
            }
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                // 获取所有药物
                const medRes = await fetch(API_BASE + '/api/medicines', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const medicines = medRes.ok ? await medRes.json() : [];
                
                // 计算统计数据
                let totalDays = 0;
                let streak = 0;
                const today = new Date();
                const weekDays = [];
                
                // 获取近30天的记录来计算依从率
                for (let i = 0; i < 30; i++) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const recordRes = await fetch(API_BASE + '/api/records?date=' + dateStr, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    
                    if (recordRes.ok) {
                        const records = await recordRes.json();
                        if (records.length > 0) {
                            totalDays++;
                            if (i < 7) {
                                weekDays.unshift({ date: dateStr, taken: true });
                            }
                            // 计算连续打卡
                            if (i === 0 || (i === 1 && records.length > 0)) {
                                streak++;
                            }
                        } else if (i < 7) {
                            weekDays.unshift({ date: dateStr, taken: false });
                        }
                    } else if (i < 7) {
                        weekDays.unshift({ date: dateStr, taken: false });
                    }
                }
                
                // 计算连续打卡（从今天往前）
                streak = 0;
                for (let i = 0; i < 30; i++) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const recordRes = await fetch(API_BASE + '/api/records?date=' + dateStr, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    
                    if (recordRes.ok) {
                        const records = await recordRes.json();
                        if (records.length > 0) {
                            streak++;
                        } else if (i > 0) {
                            break;
                        }
                    }
                }
                
                // 渲染统计
                document.getElementById('statDays').textContent = totalDays;
                document.getElementById('statStreak').textContent = streak;
                
                // 依从率 = 服药天数 / (药物数量 * 实际天数) * 100
                const daysSinceRegistration = Math.ceil((today - new Date(userData.created_at)) / (1000 * 60 * 60 * 24));
                const expectedDays = medicines.length * daysSinceRegistration;
                const rate = expectedDays > 0 ? Math.round((totalDays / Math.min(expectedDays, 30)) * 100) : 0;
                document.getElementById('statRate').textContent = Math.min(rate, 100) + '%';
                
                // 渲染周打卡
                renderWeekCalendar(weekDays);
                
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
        
        // 渲染周打卡日历
        function renderWeekCalendar(days) {
            const container = document.getElementById('weekCalendar');
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            
            // 确保有7天
            while (days.length < 7) {
                const date = new Date();
                date.setDate(date.getDate() - days.length);
                days.unshift({ date: date.toISOString().split('T')[0], taken: false });
            }
            
            container.innerHTML = days.map((d, i) => {
                const date = new Date(d.date);
                const dayName = dayNames[date.getDay()];
                const isToday = d.date === new Date().toISOString().split('T')[0];
                
                let className = 'day-empty';
                let text = dayName;
                if (d.taken) {
                    className = 'day-taken';
                } else if (!isToday && d.date < new Date().toISOString().split('T')[0]) {
                    className = 'day-missed';
                }
                
                return `<div class="calendar-day ${className}">${text}</div>`;
            }).join('');
        }
        
        // 检查通知状态
        function checkNotificationStatus() {
            const t = i18n[currentLang];
            if (!('Notification' in window)) {
                document.getElementById('notificationStatus').textContent = t.notificationNotSupported;
                document.getElementById('notificationToggle').disabled = true;
                return;
            }
            
            const status = Notification.permission;
            const statusEl = document.getElementById('notificationStatus');
            
            if (status === 'granted') {
                statusEl.textContent = t.authorized;
                document.getElementById('notificationToggle').checked = true;
            } else if (status === 'denied') {
                statusEl.textContent = t.denied;
                document.getElementById('notificationToggle').disabled = true;
            } else {
                statusEl.textContent = t.unauthorized;
            }
        }
        
        // 请求通知权限
        async function requestNotificationPermission() {
            const t = i18n[currentLang];
            if (!('Notification' in window)) {
                showToast(t.notificationNotSupported);
                return;
            }
            
            const permission = await Notification.requestPermission();
            checkNotificationStatus();
            
            if (permission === 'granted') {
                showToast(t.notificationEnabled);
            } else if (permission === 'denied') {
                showToast(t.notificationDenied);
            }
        }
        
        // 切换通知开关
        function toggleNotification() {
            if (Notification.permission === 'default') {
                requestNotificationPermission();
            } else if (Notification.permission !== 'granted') {
                document.getElementById('notificationToggle').checked = false;
                showToast(i18n[currentLang].unauthorized);
            }
        }
        
        // 导出服药记录
        async function exportData() {
            const t = i18n[currentLang];
            try {
                const records = [];
                const today = new Date();
                
                showToast(t.exporting);
                
                // 导出近30天记录
                for (let i = 0; i < 30; i++) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const res = await fetch(API_BASE + '/api/records?date=' + dateStr, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    
                    if (res.ok) {
                        const dayRecords = await res.json();
                        if (dayRecords.length > 0) {
                            records.push(...dayRecords.map(r => ({
                                date: dateStr,
                                medicine: r.name,
                                dose: r.dose,
                                taken_at: r.taken_at
                            })));
                        }
                    }
                }
                
                downloadJSON(records, 'medicine-records.json');
                showToast(t.recordsExported);
                
            } catch (e) {
                showToast(t.exportFailed);
            }
        }
        
        // 导出药物列表
        async function exportMedicines() {
            const t = i18n[currentLang];
            try {
                const res = await fetch(API_BASE + '/api/medicines', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!res.ok) throw new Error();
                
                const medicines = await res.json();
                downloadJSON(medicines, 'medicines.json');
                showToast(t.medicinesExported);
                
            } catch (e) {
                showToast(t.exportFailed);
            }
        }
        
        // 下载 JSON 文件
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 返回主页
        function goBack() {
            window.location.href = 'medicine-reminder.html';
        }
        
        // 登出
        function logout() {
            if (!confirm(i18n[currentLang].confirmLogout)) return;
            
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_picture');
            token = null;
            
            showToast(i18n[currentLang].loggedOut);
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
        
        // 显示 Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
        
        // 启动
        init();
    </script>
